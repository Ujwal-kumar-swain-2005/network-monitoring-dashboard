server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:networkmonitor}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

# Custom monitoring configuration
monitoring:
  alerts:
    cpu-threshold: 90.0
    memory-threshold: 85.0
  server:
    timeout-seconds: 30

logging:
  level:
    com.networkmonitor: INFO
    org.springframework.web.socket: INFO
